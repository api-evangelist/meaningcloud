aid: meaningcloud
name: MeaningCloud
description: MeaningCloud is a cloud-based text analytics and natural language processing
  REST API platform providing sentiment analysis, topic extraction, text classification,
  language detection, document clustering, corporate reputation analysis, document
  structure extraction, and deep semantic analysis across multiple languages.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/meaningcloud/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Text Analytics
  - Natural Language Processing
  - Sentiment Analysis
  - Topic Extraction
  - Text Classification
  - Language Detection
  - NLP
  - Semantic Analysis
apis:
  - aid: meaningcloud:sentiment-analysis-api
    name: Sentiment Analysis API
    description: Performs detailed multilingual sentiment analysis of texts from different
      sources, returning polarity, agreement, subjectivity, irony, and confidence
      scores at document, sentence, and segment levels.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/sentiment-analysis
    baseURL: https://api.meaningcloud.com
    tags:
      - Sentiment Analysis
      - NLP
      - Text Analytics
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/sentiment-analysis/doc/2.1
  - aid: meaningcloud:topics-extraction-api
    name: Topics Extraction API
    description: Identifies and extracts named entities (people, places, organizations)
      and abstract concepts within text, providing relevance scores and ontology types.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/topics-extraction
    baseURL: https://api.meaningcloud.com
    tags:
      - Topic Extraction
      - Named Entity Recognition
      - NLP
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/topics-extraction/doc/2.0
  - aid: meaningcloud:text-classification-api
    name: Text Classification API
    description: Assigns one or more classes to a text according to content using
      predefined or custom taxonomy models, supporting multilingual classification
      with configurable hierarchy expansion.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/text-classification
    baseURL: https://api.meaningcloud.com
    tags:
      - Text Classification
      - NLP
      - Taxonomy
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/text-classification/doc/1.1
  - aid: meaningcloud:language-identification-api
    name: Language Identification API
    description: Detects the language in which a given text is written, returning
      ISO-639 codes and confidence scores for multiple candidate languages.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/language-identification
    baseURL: https://api.meaningcloud.com
    tags:
      - Language Detection
      - NLP
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/language-identification/doc/2.0
  - aid: meaningcloud:deep-categorization-api
    name: Deep Categorization API
    description: Premium API that performs deep semantic text classification using
      advanced rule-based and machine learning models, supporting polarity and verbose
      output modes.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/deep-categorization
    baseURL: https://api.meaningcloud.com
    tags:
      - Deep Categorization
      - Semantic Analysis
      - NLP
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/deep-categorization/doc/1.0
  - aid: meaningcloud:text-clustering-api
    name: Text Clustering API
    description: Groups a set of texts by thematic similarity, returning clusters
      with titles, relevance scores, and document lists. Supports multiple clustering
      modes and custom stopword lists.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/text-clustering
    baseURL: https://api.meaningcloud.com
    tags:
      - Text Clustering
      - Document Grouping
      - NLP
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/text-clustering/doc/1.0
  - aid: meaningcloud:corporate-reputation-api
    name: Corporate Reputation API
    description: Semantically tags content for corporate reputation analysis, identifying
      entities and assigning reputational categories with polarity scores to support
      brand monitoring use cases.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/corporate-reputation
    baseURL: https://api.meaningcloud.com
    tags:
      - Corporate Reputation
      - Brand Monitoring
      - NLP
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/corporate-reputation/doc/2.0
  - aid: meaningcloud:summarization-api
    name: Summarization API
    description: Automatically extracts a summary from a document by selecting the
      most relevant sentences, with configurable sentence count output.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/summarization
    baseURL: https://api.meaningcloud.com
    tags:
      - Summarization
      - Text Analytics
      - NLP
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/summarization/doc/1.0
  - aid: meaningcloud:document-structure-api
    name: Document Structure API
    description: Extracts structural sections from markup documents including title,
      headings, abstract, and email fields such as from, to, cc, and subject.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.meaningcloud.com/developer/document-structure
    baseURL: https://api.meaningcloud.com
    tags:
      - Document Structure
      - Text Parsing
      - NLP
    properties:
      - type: Documentation
        url: https://www.meaningcloud.com/developer/document-structure/doc/1.0
